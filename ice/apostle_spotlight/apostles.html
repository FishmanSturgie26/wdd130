<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        .card {
            background: url(images/christus.webp);
            width: 700px;
            height: 500px;
            border: 7px solid black;
            border-radius: 6%;
            margin: 0 auto;
            background-position: center;
            background-size: 960px 540px;
            background-repeat: no-repeat;
        }

        .top-images {
            display: flex;
            justify-content: center;
            text-align: center;
            align-items: center;
            gap: 6px;
        }

        .top-images img {
            border: 5px solid white;
            border-radius: 100%;
            width: 100px;
        }

        #small {
            width: 70px;
            border: 3px solid white;
            border-radius: 100%;
        }

        header {
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 32px;
            color:white;
            padding: 5px;
        }

        .twelve {
            text-align: center;
            font-size: 20px;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            padding: 5px;
        }

        .first_tw {
            display: flex;
            justify-content: center;
            text-align: center;
            align-items: center;
            gap: 12px;
            padding: 3px;
        }

        .sec_tw {
            display: flex;
            justify-content: center;
            text-align: center;
            align-items: center;
            gap: 12px;
            padding: 3px;
        }

        .thir_tw {
            display: flex;
            justify-content: center;
            text-align: center;
            align-items: center;
            gap: 12px;
            padding: 3px;
        }

    </style>
</head>
<body>
    <div class="card">
    <header>First Presidency</header>
        <body>
            <div class="top-images">
                <img class="mid" src="images/eyring.webp">
                <img class="oaks" src="images/oaks.webp">
                <img class="mid" src="images/christofferson.webp">
            </div>
        </body>
        <footer>
            <div class="twelve">
                Quorum of the 12 Apostles
            </div>
                <div class="first_tw">
                <img id="small" src="images/holland.webp">
                <img id="small" src="images/uchtdorf.webp">
                <img id="small" src="images/bednar.webp">
                <img id="small" src="images/cook.webp">
            </div>
            <div class="sec_tw">
                <img id="small" src="images/anderson.webp">
                <img id="small" src="images/rasband.webp">
                <img id="small" src="images/stevenson.webp">
                <img id="small" src="images/renlund.webp">
            </div>
            <div class="thir_tw">
                <img id="small" src="images/gong.webp">
                <img id="small" src="images/soares.webp">
                <img id="small" src="images/kearon.webp">
                <img id="small" src="images/causse.webp">
            </div>
       </footer> 
    
</div>
</body>
</html>
